apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup-step
      image: alpine
      script: |
        echo "Cleaning workspace..."
        rm -rf node_modules

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-tests
spec:
  steps:
    - name: install
      image: node:18
      script: |
        npm install

    - name: run-jest-tests
      image: node:18
      script: |
        npm test
